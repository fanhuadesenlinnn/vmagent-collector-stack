# SNMP Exporter 最小可用配置。
# 生产环境建议使用 snmp_exporter generator 生成更完整的厂商 MIB 模块。

auths:
  public_v2:
    version: 2
    community: public
  public_v1:
    version: 1
    community: public
  # SNMPv3 示例：启用前请替换账号密码，并在 targets/snmp/*.yml 中使用 auth: private_v3
  private_v3:
    version: 3
    security_level: authPriv
    username: snmpuser
    password: CHANGE_AUTH_PASSWORD
    auth_protocol: SHA
    priv_protocol: AES
    priv_password: CHANGE_PRIV_PASSWORD

modules:
  # 网络设备接口基础指标。
  if_mib:
    walk:
      - 1.3.6.1.2.1.2          # IF-MIB::interfaces
      - 1.3.6.1.2.1.31.1.1     # IF-MIB::ifXTable
    max_repetitions: 25
    retries: 3
    timeout: 5s

  # 设备系统信息。
  system:
    walk:
      - 1.3.6.1.2.1.1          # SNMPv2-MIB::system
    retries: 3
    timeout: 5s
